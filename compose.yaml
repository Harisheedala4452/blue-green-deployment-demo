services:
  blue:
    build:
      context: .
    image: blue-green-demo-app:local
    environment:
      APP_COLOR: blue
      APP_VERSION: "1.0.0-blue"
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  green:
    build:
      context: .
    image: blue-green-demo-app:local
    environment:
      APP_COLOR: green
      APP_VERSION: "1.1.0-green"
    expose:
      - "5000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:5000/health', timeout=2).read()"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      blue:
        condition: service_healthy
      green:
        condition: service_healthy
    ports:
      - "8080:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d:ro
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
